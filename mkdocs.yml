site_name: MaterialX Docs
site_description: Kompletní produkční dokumentace pro GitHub Pages.
site_author: OpenAI
site_url: https://example.github.io/materialx-docs/
repo_name: materialx-docs
repo_url: https://github.com/USERNAME/materialx-docs
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: materialx
  custom_dir: docs/overrides
  language: cs
  palette:
    - scheme: slate
      primary: slate
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Přepnout do světlého režimu
    - scheme: default
      primary: slate
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Přepnout do tmavého režimu
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.footer
    - navigation.tracking
    - navigation.instant
    - navigation.instant.prefetch
    - toc.follow
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - content.tooltips

nav:
  - Domů: index.md
  - Začínáme:
      - Úvod: getting-started/introduction.md
      - Instalace: getting-started/installation.md
      - Rychlý start: getting-started/quick-start.md
  - Průvodce:
      - Navigace: guide/navigation.md
      - Vyhledávání: guide/search.md
      - Editace: guide/editing.md
      - Nasazení: guide/deployment.md
  - Přizpůsobení:
      - Téma: customization/theme.md
      - Barvy: customization/colors.md
      - Overrides: customization/overrides.md
  - Obsah:
      - Markdown: content/markdown.md
      - SEO: content/seo.md
      - Social cards: content/social-cards.md
  - Reference:
      - Slovník: reference/glossary.md
  - Řešení problémů:
      - Build: troubleshooting/build.md

plugins:
  - search:
      separator: '[\s\-\.]+'
      lang:
        - cs
        - en
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      auto_title: true
      linenums: true
      linenums_style: table
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.smartsymbols

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/USERNAME/materialx-docs

extra_css:
  - assets/css/extra.css
  - assets/css/skeleton.css
  - assets/css/syntax.css

extra_javascript:
  - assets/js/app.js
  - assets/js/skeleton.js
