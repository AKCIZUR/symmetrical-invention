site_name: MaterialX Docs Starter
site_description: Production-ready MkDocs MaterialX starter for GitHub Pages.
site_author: OpenAI
# Update this to your actual published Pages URL before release.
site_url: https://example.github.io/materialx-docs-starter/

repo_name: materialx-docs-starter
repo_url: https://github.com/USERNAME/materialx-docs-starter
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: materialx
  custom_dir: docs/overrides
  language: en
  palette:
    - scheme: grey
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.footer
    - navigation.tracking
    - navigation.instant
    - navigation.instant.prefetch
    - toc.follow
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - content.tooltips

plugins:
  - search:
      separator: '[\s\-\.]+'
      lang:
        - en
  - awesome-pages
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      auto_title: true
      linenums: true
      linenums_style: table
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.smartsymbols

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/USERNAME/materialx-docs-starter
    - icon: fontawesome/brands/discourse
      link: https://example.com/community
  generator: false

extra_css:
  - assets/css/extra.css
  - assets/css/skeleton.css
  - assets/css/syntax.css

extra_javascript:
  - assets/js/app.js
  - assets/js/skeleton.js
